version: '3.9'

services:

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;Database=TradingCsvProcessor;
        User Id=sa;Password=${SA_PASSWORD:-YourStr0ngP@ss!};
        TrustServerCertificate=True;MultipleActiveResultSets=true;
        Max Pool Size=100;Connection Timeout=30;
      FileStorage__Path: /app/uploads
      Processing__ChunkSize: "5000"
      Processing__DegreeOfParallelism: "4"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ── SQL Server 2022 ───────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: trading-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD:-YourStr0ngP@ss!}"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "$$SA_PASSWORD"
        -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  uploads:
  logs:
  sqldata:
